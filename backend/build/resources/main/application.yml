micronaut:
  application:
    name: kpn-quest
  server:
    port: 8081
  executors:
    io:
      type: virtual   # Java 21 virtual threads for blocking I/O
  security:
    enabled: true
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: ${JWT_SECRET:`change-me-in-production-use-at-least-256-bits!!`}
              jws-algorithm: HS256

datasources:
  default:
    url: jdbc:sqlserver://localhost:1433;databaseName=kpnquest;encrypt=false
    username: sa
    password: YourStrong@Password123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

flyway:
  enabled: true
  baseline-on-migrate: true
  validate-on-migrate: false
  placeholders:
    flyway: test
  datasources:
    default:
      locations:
        - classpath:db/migration
